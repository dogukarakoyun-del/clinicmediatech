<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClinicMediaTech — Görüşme</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230f5c47'/><text x='50' y='68' text-anchor='middle' font-size='60' font-weight='bold' fill='white'>C</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --green: #0f5c47;
    --green-light: #17a87a;
    --bg: #060d0a;
    --surface: #0d1a14;
    --border: rgba(23,168,122,0.12);
    --text: #e4ede9;
    --muted: #5a7a6a;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); height: 100dvh; overflow: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: radial-gradient(ellipse 60% 50% at 20% 80%, rgba(15,92,71,0.18) 0%, transparent 60%), radial-gradient(ellipse 40% 60% at 80% 20%, rgba(23,168,122,0.08) 0%, transparent 50%);
    pointer-events: none;
  }
  #loading { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; transition: opacity 0.6s ease; }
  #loading.fade-out { opacity: 0; pointer-events: none; }
  .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 52px; }
  .logo-mark { width: 38px; height: 38px; background: linear-gradient(135deg, var(--green), var(--green-light)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: 'Instrument Serif', serif; font-size: 20px; color: #fff; box-shadow: 0 0 24px rgba(23,168,122,0.3); }
  .logo-name { font-size: 17px; font-weight: 500; }
  .logo-name em { font-style: normal; color: var(--green-light); }
  .pulse-ring { width: 80px; height: 80px; border-radius: 50%; border: 1.5px solid rgba(23,168,122,0.25); display: flex; align-items: center; justify-content: center; margin-bottom: 32px; position: relative; animation: rpulse 2s ease-in-out infinite; }
  .pulse-ring::before { content: ''; position: absolute; inset: -14px; border-radius: 50%; border: 1px solid rgba(23,168,122,0.1); animation: rpulse 2s ease-in-out infinite 0.35s; }
  .pulse-ring::after { content: ''; position: absolute; inset: -28px; border-radius: 50%; border: 1px solid rgba(23,168,122,0.05); animation: rpulse 2s ease-in-out infinite 0.7s; }
  @keyframes rpulse { 0%,100%{ opacity:1; transform:scale(1); } 50%{ opacity:0.4; transform:scale(1.05); } }
  .pulse-core { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--green), var(--green-light)); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 24px rgba(23,168,122,0.45); }
  .pulse-core svg { width: 18px; height: 18px; fill: white; }
  .load-title { font-family: 'Instrument Serif', serif; font-size: 24px; margin-bottom: 10px; text-align: center; }
  .load-status { font-size: 13px; color: var(--muted); font-weight: 300; animation: fpulse 1.8s ease-in-out infinite; }
  @keyframes fpulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
  #meeting { position: fixed; inset: 0; display: none; flex-direction: column; z-index: 5; }
  #meeting.active { display: flex; }
  .bar { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; background: rgba(6,13,10,0.96); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .bar-left { display: flex; align-items: center; gap: 8px; }
  .bar-mark { width: 28px; height: 28px; background: linear-gradient(135deg, var(--green), var(--green-light)); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-family: 'Instrument Serif', serif; font-size: 14px; color: #fff; }
  .bar-name { font-size: 13px; font-weight: 500; }
  .bar-name em { font-style: normal; color: var(--green-light); }
  .bar-right { display: flex; align-items: center; gap: 10px; }
  .badge-live { display: flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 600; color: var(--green-light); background: rgba(23,168,122,0.08); border: 1px solid rgba(23,168,122,0.15); padding: 3px 10px; border-radius: 10px; }
  .dot { width: 5px; height: 5px; background: var(--green-light); border-radius: 50%; animation: blink 1.2s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  .badge-enc { font-size: 10px; color: #3a5248; display: flex; align-items: center; gap: 4px; }
  .badge-enc svg { width: 10px; height: 10px; fill: #3a5248; }
  .frame { flex: 1; }
  .frame iframe { width: 100%; height: 100%; border: none; display: block; background: #000; }
  #error { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 20; padding: 20px; }
  #error.active { display: flex; }
  .err-icon { font-size: 40px; margin-bottom: 20px; }
  .err-title { font-family: 'Instrument Serif', serif; font-size: 24px; margin-bottom: 8px; text-align: center; }
  .err-sub { font-size: 13px; color: var(--muted); text-align: center; max-width: 340px; line-height: 1.6; margin-bottom: 18px; font-weight: 300; }
  .err-detail { font-size: 11px; color: #d08080; background: rgba(176,96,96,0.08); border: 1px solid rgba(176,96,96,0.2); padding: 10px 14px; border-radius: 8px; max-width: 480px; word-break: break-all; margin-bottom: 22px; font-family: monospace; text-align: left; }
  .retry-btn { background: var(--surface); color: var(--text); border: 1px solid var(--border); padding: 11px 30px; border-radius: 50px; font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; transition: all 0.2s; margin-bottom: 16px; }
  .retry-btn:hover { background: rgba(23,168,122,0.08); border-color: rgba(23,168,122,0.3); }
  .err-contact { font-size: 12px; color: var(--muted); background: var(--surface); padding: 10px 20px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
  .err-contact a { color: var(--green-light); text-decoration: none; }
</style>
</head>
<body>

<div id="loading">
  <div class="logo">
    <div class="logo-mark">C</div>
    <div class="logo-name">Clinic<em>Media</em>Tech</div>
  </div>
  <div class="pulse-ring">
    <div class="pulse-core">
      <svg viewBox="0 0 24 24"><path d="M17 10.5V7a1 1 0 00-1-1H4a1 1 0 00-1 1v10a1 1 0 001 1h12a1 1 0 001-1v-3.5l4 4v-11l-4 4z"/></svg>
    </div>
  </div>
  <div class="load-title">Danışmanınız Hazırlanıyor</div>
  <div class="load-status" id="status">Bağlantı kuruluyor...</div>
</div>

<div id="meeting">
  <div class="bar">
    <div class="bar-left">
      <div class="bar-mark">C</div>
      <div class="bar-name">Clinic<em>Media</em>Tech</div>
    </div>
    <div class="bar-right">
      <div class="badge-live"><div class="dot"></div>CANLI</div>
      <div class="badge-enc">
        <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1s3.1 1.39 3.1 3.1v2z"/></svg>
        Şifrelenmiş
      </div>
    </div>
  </div>
  <div class="frame">
    <iframe id="frame" allow="camera;microphone;autoplay;display-capture;fullscreen"></iframe>
  </div>
</div>

<div id="error">
  <div class="logo">
    <div class="logo-mark">C</div>
    <div class="logo-name">Clinic<em>Media</em>Tech</div>
  </div>
  <div class="err-icon">⚠️</div>
  <div class="err-title">Bağlantı Kurulamadı</div>
  <div class="err-sub">Görüşme başlatılırken bir sorun oluştu. Lütfen tekrar deneyin.</div>
  <div class="err-detail" id="errDetail"></div>
  <button class="retry-btn" onclick="location.reload()">Tekrar Dene</button>
  <div class="err-contact">
    <a href="https://wa.me/905379265751" target="_blank">WhatsApp ile ulaşın</a>
  </div>
</div>

<script>
const API_KEY    = "a54d72a7cb9a4cb6a5e373373d098213";
const PERSONA_ID = "pd343cf3dd27";
const REPLICA_ID = "r9fa0878977a";

function showError(msg) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('errDetail').textContent = msg || '';
  document.getElementById('error').classList.add('active');
}

async function endActiveConversations() {
  try {
    const res = await fetch('https://tavusapi.com/v2/conversations', {
      headers: { 'x-api-key': API_KEY }
    });
    if (!res.ok) return;
    const data = await res.json();
    const list = data.data || data.conversations || [];
    const active = list.filter(c => c.status === 'active' || c.status === 'pending');
    for (const c of active) {
      try {
        await fetch('https://tavusapi.com/v2/conversations/' + c.conversation_id + '/end', {
          method: 'POST',
          headers: { 'x-api-key': API_KEY }
        });
      } catch (e) {}
    }
  } catch (e) {}
}

async function start() {
  const status = document.getElementById('status');
  try {
    status.textContent = 'Hazırlık yapılıyor...';
    await endActiveConversations();
    status.textContent = 'Danışman hazırlanıyor...';
    const res = await fetch('https://tavusapi.com/v2/conversations', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': API_KEY },
      body: JSON.stringify({
        persona_id: PERSONA_ID,
        replica_id: REPLICA_ID,
        properties: {
          max_call_duration: 900,
          participant_left_timeout: 60,
          participant_absent_timeout: 120,
          language: 'multilingual'
        }
      })
    });
    const data = await res.json();
    if (!res.ok || !data.conversation_url) {
      showError('HTTP ' + res.status + ' — ' + JSON.stringify(data));
      return;
    }
    status.textContent = 'Hazır, yükleniyor...';
    await new Promise(r => setTimeout(r, 800));
    document.getElementById('frame').src = data.conversation_url;
    document.getElementById('loading').classList.add('fade-out');
    setTimeout(() => {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('meeting').classList.add('active');
    }, 600);
  } catch (err) {
    showError(err.message || String(err));
  }
}

start();
</script>
</body>
</html>
